<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Projectile Simulator</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        canvas {
            background-color: white;
            border: 2px solid black;
            margin-top: 20px;
        }

        #stats {
            margin-top: 10px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>Projectile Motion Simulator</h1>

    <canvas id="canvas" width="600" height="400"></canvas>

    <div id="stats">
        <p>Time: <span id="time">0</span> s</p>
        <p>Max Height: <span id="height">0</span> m</p>
        <p>Range: <span id="range">0</span> m</p>
    </div>

    <script src="script.js"></script>

</body>
</html>
